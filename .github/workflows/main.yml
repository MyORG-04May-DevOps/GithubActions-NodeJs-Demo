name: Build nodejs application using github actions
on: 
  push:  # run on every push to the master branch
    branches:
        - master
  workflow_dispatch: # run manually
jobs:
   buildnodejs:
    continue-on-error: true 
    strategy:
     matrix:
      node-version: [12, 16, 18, 20] # run the job for both nodejs versions 18 and 20
      operating-system: [ubuntu-latest, windows-latest] # run the job on both ubuntu and windows operating systems
      exclude:
        - node-version: 12
          operating-system: windows-latest
        - node-version: 12
          operating-system: ubuntu-latest
    runs-on: ${{ matrix.operating-system }} # run the job on the operating system defined in the matrix
    steps:  # all steps will be exeucted ont he runner
        - name: Checkout code
          uses: actions/checkout@v6 
        - name: Install nodejs of version ${{ matrix.node-version }} and npm
          uses: actions/setup-node@v6
          with:
            node-version: ${{ matrix.node-version }}
        - name: Install dependencies using npm
          run: npm install
        - name: run tests using npm
          run: npm test
        - name: build the application using npm
          run: npm run build
